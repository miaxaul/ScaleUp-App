<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimii Submission System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        .card { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { font-weight: 600; font-size: 24px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .upload-section { background: #f1f5f9; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        input[type="text"], input[type="file"] { padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; margin-right: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        button:hover { background: #4f46e5; transform: translateY(-1px); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 14px; }
        td { padding: 16px 12px; border-bottom: 1px solid #f1f5f9; font-size: 15px; }
        .badge { background: #dcfce7; color: #166534; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <h1>✨ Assignment Submission</h1>
        <div class="upload-section">
            <form action="/upload" method="post" enctype="multipart/form-data">
                <input type="text" name="assignment_name" placeholder="Judul Tugas..." required>
                <input type="file" name="file_tugas" required>
                <button type="submit">Submit Tugas</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ASSIGNMENT</th>
                    <th>FILE NAME</th>
                    <th>SUBMITTED AT</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody>
                {% for s in submissions %}
                <tr>
                    <td><strong>{{ s[0] }}</strong></td>
                    <td>{{ s[1] }}</td>
                    <td>{{ s[2].strftime('%d %b, %H:%M') }}</td>
                    <td><span class="badge">{{ s[3] }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
